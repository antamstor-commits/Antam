<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antam Elite Gold</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: white;
}

/* NAVBAR */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

.logo {
    font-family: 'Playfair Display', serif;
    color: gold;
    font-size: 26px;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: #ccc;
    transition: 0.3s;
}

nav a:hover {
    color: gold;
}

/* HERO */
.hero {
    height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, transparent, black);
    text-align: center;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 50px;
    color: gold;
}

.hero p {
    max-width: 500px;
    opacity: 0.8;
}

.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    background: linear-gradient(45deg, gold, #ffd700);
    color: black;
    cursor: pointer;
    border-radius: 30px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* SECTION */
.container {
    padding: 60px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 30px;
}

/* CARD GLASS */
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
}

.price {
    color: gold;
    font-size: 20px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    background: black;
    margin-top: 50px;
}
</style>
</head>

<body>

<header>
    <div class="logo">ANTAM ELITE</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Produk</a>
        <a href="#">Investasi</a>
        <a href="#">Kontak</a>
    </nav>
</header>

<section class="hero">
    <h1>Investasi Emas Kelas Dunia</h1>
    <p>Keamanan, kepercayaan, dan nilai abadi dalam setiap gram emas</p>
    <button class="btn">Mulai Investasi</button>
</section>

<div class="container">
    <h2>Produk Eksklusif</h2>

    <div class="products">

        <div class="card">
            <h3>Antam 1 Gram</h3>
            <p class="price">Rp 1.200.000</p>
            <button class="btn">Beli</button>
        </div>

        <div class="card">
            <h3>Antam 5 Gram</h3>
            <p class="price">Rp 5.800.000</p>
            <button class="btn">Beli</button>
        </div>

        <div class="card">
            <h3>Antam 10 Gram</h3>
            <p class="price">Rp 11.500.000</p>
            <button class="btn">Beli</button>
        </div>

    </div>
</div>

<footer>
    © 2026 Antam Elite Gold | Premium Investment Platform
</footer>

</body>
</html>
